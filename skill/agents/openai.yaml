interface:
  display_name: "Clarify First"
  short_description: "Turn dense answers into concise, understanding-first formats"
  icon_small: "./assets/clarify-first-icon.png"
  icon_large: "./assets/clarify-first-icon.png"
  brand_color: "#0E3A5B"
  default_prompt: "Use $clarify-first to turn complex answers into the clearest format. Proactively choose explanation, visualization, summary, checklist, comparison, timeline, HTML, or image when that lowers cognitive load, even if the user did not request a format. Mirror the user's language by default and localize labels for HTML or image outputs."
